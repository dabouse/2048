<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - Matrix Terminal</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/animations.css">
    <link rel="stylesheet" href="styles/matrix-effects.css">
</head>
<body>
    <div class="terminal-container">
        <div class="terminal-header">
            <div class="terminal-title">
                <span class="blink">_</span> MATRIX_2048_TERMINAL_v1.0
            </div>
            <div class="system-info">
                <span id="score-display">SCORE: 0</span>
                <span id="best-score">BEST: 0</span>
                <span id="moves">MOVES: 0</span>
            </div>
        </div>

        <div class="game-controls">
            <button id="new-game" class="terminal-btn">[NEW_GAME]</button>
            <button id="undo" class="terminal-btn">[UNDO]</button>
            <button id="debug" class="terminal-btn debug-btn">[DEBUG]</button>
            <button id="quit" class="terminal-btn">[QUIT]</button>
        </div>

        <div class="game-board-container">
            <div id="game-board" class="game-board">
                <!-- Grid generated by JavaScript -->
            </div>
            
            <div class="direction-controls">
                <div class="control-row">
                    <button class="control-btn" data-direction="up">↑</button>
                </div>
                <div class="control-row">
                    <button class="control-btn" data-direction="left">←</button>
                    <button class="control-btn" data-direction="down">↓</button>
                    <button class="control-btn" data-direction="right">→</button>
                </div>
            </div>
        </div>

        <div class="terminal-footer">
            <div class="status-line">
                <span id="status">SYSTEM_READY</span>
            </div>
            <div class="controls-hint">
                USE_ARROW_KEYS_OR_BUTTONS_TO_MOVE
            </div>
        </div>
    </div>

    <div id="game-over" class="game-over hidden">
        <div class="game-over-content">
            <h2 class="glitch-text">SYSTEM_FAILURE</h2>
            <p>NO_MORE_MOVES_AVAILABLE</p>
            <div class="final-score">
                FINAL_SCORE: <span id="final-score-value">0</span>
            </div>
            <button id="restart" class="terminal-btn">[RESTART_SYSTEM]</button>
        </div>
    </div>

    <div id="victory" class="victory hidden">
        <div class="victory-content">
            <h2 class="glitch-text">MATRIX_ACHIEVED</h2>
            <p>YOU_REACHED_2048!</p>
            <div class="final-score">
                FINAL_SCORE: <span id="victory-score-value">0</span>
            </div>
            <button id="continue" class="terminal-btn">[CONTINUE]</button>
            <button id="restart-victory" class="terminal-btn">[NEW_MATRIX]</button>
        </div>
    </div>

    <script src="scripts/storage.js"></script>
    <script src="scripts/game.js"></script>
    <script src="scripts/animations.js"></script>
    <script src="scripts/ui.js"></script>
</body>
</html>
